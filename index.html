<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liens</title>

  <style>
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#2b2b2b;
      margin:0;
      padding:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .container{
      width:100%;
      max-width:380px;
      text-align:center;
    }

    h1{
      color:#fff;
      font-size:20px;
      margin:0 0 20px;
      font-weight:600;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      padding:14px;
      margin:0 0 14px;
      font-size:16px;
      font-weight:700;
      text-decoration:none;
      border-radius:12px;
      box-shadow:0 6px 16px rgba(0,0,0,.35);
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transition:transform .1s ease, box-shadow .1s ease, background .15s ease;
      box-sizing:border-box;
    }

    .btn:active{
      transform:translateY(2px);
      box-shadow:0 3px 8px rgba(0,0,0,.35);
    }

    .btn-linkedin{ background:#0A66C2; color:#fff; }
    .btn-mail{ background:#9b1c2f; color:#fff; }
    .btn-whatsapp{ background:#25D366; color:#fff; }

    .separator{
      margin:26px 0 26px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }

    .separator-line{
      width:60%;
      height:1px;
      background:rgba(255,255,255,.25);
    }

    .separator-text{
      font-size:14px;
      color:#ffffff;
      opacity:.95;
      font-weight:700;
      letter-spacing:.04em;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Me contacter</h1>

    <a class="btn btn-linkedin"
       href="https://www.linkedin.com/in/nils-van-caeneghem-347257198/"
       target="_blank" rel="noopener">
      LinkedIn
    </a>

    <a class="btn btn-mail"
       href="mailto:nils.vancaeneghem@edu.em-lyon.com">
      Email
    </a>

    <div class="separator">
      <div class="separator-line"></div>
      <div class="separator-text">Future of AI</div>
      <div class="separator-line"></div>
    </div>

    <a class="btn btn-whatsapp"
       href="https://chat.whatsapp.com/BR9NaXSGkMw7OqADl5XNC6?mode=gi_t"
       target="_blank" rel="noopener">
      WhatsApp
    </a>
  </div>
</body>
</html>
